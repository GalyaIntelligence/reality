<svg xmlns="http://www.w3.org/2000/svg" width="980" height="310" viewBox="0 0 980 310" role="img" aria-labelledby="title desc">
  <title id="title">Self-improving Judgement Loop</title>
  <desc id="desc">Better agent judgement — move from instinct to reality grounded intuition for clearer insights.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f4ef"/>
      <stop offset="100%" stop-color="#ebe4d8"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/>
    </marker>
  </defs>

  <rect width="980" height="310" rx="16" fill="url(#bg)"/>

  <text x="490" y="36" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700" fill="#1c1917">
    Self-improving Judgement Loop
  </text>

  <!-- Leftmost first step: Prompt (input) -->
  <g transform="translate(24, 108)">
    <rect width="112" height="48" rx="12" fill="#fff" stroke="#334155" stroke-width="2"/>
    <text x="56" y="22" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#78716c">input</text>
    <text x="56" y="40" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700" fill="#1c1917">Prompt</text>
  </g>

  <!-- Arrow Prompt → LLM -->
  <line x1="142" y1="120" x2="198" y2="86" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>

  <!-- Peer: LLM / ~~instinct~~ -->
  <g transform="translate(208, 62)">
    <rect x="28" y="0" width="86" height="26" rx="8" fill="#1c1917"/>
    <text x="71" y="18" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fafaf9">LLM</text>
    <line x1="71" y1="26" x2="71" y2="42" stroke="#78716c" stroke-width="2"/>
    <rect x="0" y="42" width="142" height="48" rx="10" fill="#fff" stroke="#a8a29e" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="71" y="72" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17" fill="#78716c">instinct</text>
    <line x1="22" y1="66" x2="120" y2="66" stroke="#b91c1c" stroke-width="2.5"/>
  </g>

  <text x="380" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#a8a29e">,</text>

  <!-- Peer: check + galya/reality / Insight -->
  <g transform="translate(402, 46)">
    <circle cx="86" cy="12" r="11" fill="#15803d"/>
    <path d="M80 12 L84 16 L93 7" fill="none" stroke="#ecfdf5" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="8" y="28" width="156" height="26" rx="8" fill="#1c1917"/>
    <text x="86" y="46" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" fill="#fafaf9">galya/reality</text>
    <line x1="86" y1="54" x2="86" y2="70" stroke="#0f766e" stroke-width="2"/>

    <rect x="8" y="70" width="156" height="48" rx="12" fill="#0f766e"/>
    <text x="86" y="100" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="700" fill="#ecfdf5">Insight</text>
  </g>

  <!-- Bidirectional reasoning -->
  <line x1="570" y1="118" x2="652" y2="118" stroke="#0f766e" stroke-width="2.4" marker-end="url(#arrowTeal)"/>
  <line x1="652" y1="144" x2="570" y2="144" stroke="#0f766e" stroke-width="2.4" marker-end="url(#arrowTeal)"/>
  <text x="611" y="135" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" fill="#0f766e">reasoning</text>

  <!-- Agent -->
  <g transform="translate(664, 88)">
    <circle cx="40" cy="40" r="38" fill="#334155"/>
    <rect x="20" y="24" width="40" height="30" rx="9" fill="#e2e8f0"/>
    <circle cx="32" cy="36" r="3.5" fill="#334155"/>
    <circle cx="48" cy="36" r="3.5" fill="#334155"/>
    <path d="M32 46 Q40 50 48 46" fill="none" stroke="#334155" stroke-width="2" stroke-linecap="round"/>
    <text x="40" y="96" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#334155">Agent</text>
  </g>

  <line x1="760" y1="130" x2="830" y2="130" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Insight -->
  <g transform="translate(844, 108)">
    <rect width="112" height="48" rx="12" fill="#0d9488"/>
    <text x="56" y="30" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="700" fill="#ecfdf5">Insight</text>
  </g>

  <!-- Caption -->
  <text x="490" y="278" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-style="italic" fill="#44403c">
    Better agent judgement — move from instinct to reality grounded intuition for clearer insights.
  </text>
</svg>
