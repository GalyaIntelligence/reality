name: CI TypeScript
on:
  push:
    paths:
      - "packages/ts/**"
      - "registry/**"
      - ".github/workflows/ci-ts.yml"
  pull_request:
    paths:
      - "packages/ts/**"
      - "registry/**"
      - ".github/workflows/ci-ts.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/ts/package-lock.json
      - name: Install
        run: npm install
      - name: Lint (tsc)
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
