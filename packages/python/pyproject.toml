[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "galya-reality"
version = "0.1.0"
description = "Galya judgement-layer SDK — resolve validators from a shared registry"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
authors = [{ name = "Galya" }]
dependencies = [
  "pydantic>=2.0",
  "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "jsonschema>=4.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/galya_reality"]

[tool.hatch.build.targets.wheel.force-include]
"../../registry/index.json" = "galya_reality/data/index.json"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
